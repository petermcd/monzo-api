---
name: UV

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

permissions:
  id-token: write # Allows actions/checkout to access the GitHub token for authentication.
  contents: read # Allows actions/checkout to read the repository contents.

jobs:
  uv:
    name: python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Python
        run: uv python install
      - name: pyTest
        run: uv run pytest tests
      - name: Ruff (check)
        run: uv run ruff check
      - name: Ruff (format)
        run: uv run ruff format --diff --check
      - name: Ty
        run: uv run ty check
      #- name: Troml
      #  run: uv run troml check
      - name: Run SonarQube
        uses: sonarsource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: $SONAR_TOKEN
          SONAR_HOST_URL: $SONAR_HOST_URL
